name: CI

on:
  push:
    branches: [master, "update-to-2.0.77"]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate dataset & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate dataset structure
        run: npm run validate:dataset

      - name: Lint
        run: npm run lint
        continue-on-error: true   # Kirk's existing code has many style issues; surface them but don't block.

      - name: Unit tests
        run: npm test

  smoke:
    name: Browser smoke test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python (for static file server)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        run: npm run smoke
